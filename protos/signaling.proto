syntax = "proto3";

package signaling;

// The "Verb": The actions Django can ask C++ to perform
service MediaSignaling {
    // Django sends a request to start a session, C++ sends back the WebRTC answer
    rpc InitiateCall(CallRequest) returns (CallResponse);
}

// The "Nouns": The data structures being passed around
message CallRequest {
    string room_id = 1;   // Matches your Django 'room_name' string
    string user_id = 2;   // The ID of the person starting the call
    string sdp_offer = 3; // The WebRTC SDP offer string from the browser
}

message CallResponse {
    bool success = 1;      // Did the C++ worker successfully initialize?
    string sdp_answer = 2; // The WebRTC SDP answer generated by C++
    string error_msg = 3;  // If success is false, why did it fail?
}