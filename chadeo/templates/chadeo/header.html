<header class="flex bg-blue-800 justify-between items-center text-white p-3 shadow-md">
    <div class="text-xl font-bold tracking-tight">
        Chadeo
    </div>

    <div class="flex items-center gap-6">
        {% if user.is_authenticated %}
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-xs font-bold border border-blue-400">
                    {{ user.username|first|upper }}
                </div>
                <span class="text-sm font-medium opacity-90">{{ user.username }}</span>
            </div>

            <form method="post" action="{% url 'chadeo:logout_user' %}" class="m-0">
                {% csrf_token %}
                <button type="submit" 
                    class="text-xs bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded font-semibold transition-colors duration-200 shadow-sm">
                    Logout
                </button>
            </form>
        {% else %}
            <div></div>
        {% endif %}
    </div>
</header>
