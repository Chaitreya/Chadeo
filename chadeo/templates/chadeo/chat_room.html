{% extends "./base.html" %}

{% block content %}
<div hx-ext="ws" ws-connect="/ws/chat/{{ room_name }}/" class="flex flex-col h-[calc(100vh-64px)] bg-gray-50">
    <h1>{{ room_name }}</h1>
    <div class="flex-1 overflow-y-auto p-4 space-y-4" id="chat-messages">
        <div class="text-center text-gray-400 text-sm italic">
            Joined the room.
        </div>
    </div>

    <div class="p-4 bg-white border-t border-gray-200">
        <form ws-send 
                    _="on htmx:wsAfterSend reset() me" class="flex gap-2 max-w-4xl mx-auto">
            <input type="text" 
                name="message"
                placeholder="Type your message..." 
                class="flex-1 border border-gray-300 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-800">
            
            <button type="submit" 
                class="bg-blue-800 text-white px-6 py-2 rounded-full font-semibold hover:bg-blue-900 transition shadow-md">
                Send
            </button>
        </form>
    </div>

</div>
{% endblock %}
